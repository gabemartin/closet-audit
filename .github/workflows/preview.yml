name: Branch Preview

on:
  push:
    branches-ignore:
      - master
      - gh-pages

permissions:
  contents: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sanitize branch name
        id: branch
        run: |
          SAFE=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "safe=$SAFE" >> $GITHUB_OUTPUT
          echo "url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/$SAFE" >> $GITHUB_OUTPUT

      - name: Build preview
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}/preview/${{ steps.branch.outputs.safe }}
        run: npm run build

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview/${{ steps.branch.outputs.safe }}
          keep_files: true
          commit_message: "preview: ${{ github.ref_name }} @ ${{ github.sha }}"

      - name: Print preview URL
        run: echo "Preview → ${{ steps.branch.outputs.url }}"
